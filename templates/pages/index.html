{% extends "layouts/main.html" %}

{% block head %}
  <style>
    #repeater-map-host {
      position: fixed;
      inset: 0;
    }

    .hero-overlay {
      position: fixed;
      right: 24px;
      top: 24px;
      z-index: 10;
      width: min(160px, calc(100vw - 32px));
      height: min(160px, calc(100vw - 32px));
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(6px);
    }

    .hero-overlay h2 {
      margin-bottom: 8px;
    }

    .hero-overlay p {
      margin: 0;
    }
  </style>
{% endblock %}

{% block header %}
{% endblock %}

{% block content %}
<div id="repeater-map-host"></div>
<aside class="hero-overlay" id="hero-overlay">
  <p>
    {% if auth.logged_in %}
    {{ auth.call_sign }}<br>
    <a href="/logout">Log out</a>
    {% else %}
    <a href="/login">Log in</a>
    {% endif %}
  </p>
</aside>
{% endblock %}

{% block scripts %}
  <script src="/static/repeater-atlas.js"></script>
  <script src="/static/vendor/leaflet/leaflet.js"></script>
  <script src="/static/vendor/leaflet.markercluster/leaflet.markercluster.js"></script>
  <script>
    const data = {{ repeater_data | json | safe }};
  </script>
  <script>
    initializeRepeaterAtlas();

    const map = buildLeafletMap(document.getElementById("repeater-map-host"));

    if (data.length === 0) {
      map.setView([64.4, 11.7], 4);
    } else {
      const clusterGroup = L.markerClusterGroup({
        showCoverageOnHover: false,
        maxClusterRadius: 10,
      });
      const bounds = [];
      data.forEach((item) => {
        const marker = L.marker([item.latitude, item.longitude]);
        marker.bindPopup(item.call_sign);
        bounds.push([item.latitude, item.longitude]);
        clusterGroup.addLayer(marker);
      });
      clusterGroup.addTo(map);
      map.fitBounds(bounds, {padding: [20, 20]});
    }

    map.invalidateSize();
</script>
{% endblock %}
